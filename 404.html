<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#06162a">
    <title>Jway - Pagina nao encontrada</title>
    <link rel="icon" href="src/assets/images/jway48x48.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-1: #06162a;
            --bg-2: #0c223d;
            --line: rgba(0, 168, 255, 0.16);
            --cyan: #00a8ff;
            --ok: #70ad47;
            --text: #eaf4ff;
            --muted: rgba(234, 244, 255, 0.68);
            --card: rgba(255, 255, 255, 0.04);
            --card-border: rgba(255, 255, 255, 0.12);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Space Grotesk", sans-serif;
            color: var(--text);
            background:
                radial-gradient(900px 450px at 15% -20%, rgba(0, 168, 255, 0.18), transparent 70%),
                radial-gradient(700px 350px at 100% 120%, rgba(112, 173, 71, 0.16), transparent 72%),
                linear-gradient(160deg, var(--bg-1), var(--bg-2));
            overflow: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(to right, transparent 0 47px, var(--line) 48px),
                linear-gradient(to bottom, transparent 0 47px, var(--line) 48px);
            background-size: 48px 48px;
            pointer-events: none;
            mask-image: radial-gradient(circle at center, black 45%, transparent 100%);
        }

        .card {
            width: min(720px, 100%);
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 18px;
            padding: clamp(24px, 5vw, 42px);
            backdrop-filter: blur(8px);
            box-shadow: 0 25px 55px rgba(0, 0, 0, 0.35);
            text-align: center;
            position: relative;
            animation: rise 420ms ease-out;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--cyan);
            border: 1px solid rgba(0, 168, 255, 0.35);
            border-radius: 999px;
            padding: 7px 12px;
            background: rgba(0, 168, 255, 0.12);
        }

        .code {
            margin: 14px 0 8px;
            font-size: clamp(4.4rem, 16vw, 7rem);
            line-height: 0.95;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: #ffffff;
            text-shadow: 0 0 16px rgba(0, 168, 255, 0.38);
        }

        h1 {
            margin: 0;
            font-size: clamp(1.2rem, 3.5vw, 1.7rem);
            font-weight: 600;
            letter-spacing: 0.01em;
        }

        p {
            margin: 12px auto 0;
            max-width: 48ch;
            color: var(--muted);
            font-size: 0.98rem;
            line-height: 1.6;
        }

        .actions {
            margin-top: 24px;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            min-height: 42px;
            padding: 10px 16px;
            border-radius: 10px;
            border: 1px solid transparent;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .btn-primary {
            background: rgba(0, 168, 255, 0.16);
            color: var(--cyan);
            border-color: rgba(0, 168, 255, 0.45);
        }

        .btn-primary:hover {
            background: var(--cyan);
            color: #001225;
            transform: translateY(-1px);
            box-shadow: 0 10px 20px rgba(0, 168, 255, 0.28);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.18);
        }

        .btn-secondary:hover {
            border-color: var(--ok);
            color: var(--ok);
            transform: translateY(-1px);
        }

        .logo {
            margin-top: 20px;
            opacity: 0.75;
        }

        .logo img {
            width: clamp(88px, 18vw, 120px);
            height: auto;
            filter: drop-shadow(0 10px 25px rgba(0, 0, 0, 0.35));
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(10px) scale(0.99); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>
</head>
<body>
    <main class="card" role="main" aria-labelledby="titulo404">
        <span class="badge">erro de navegacao</span>
        <div class="code" aria-hidden="true">404</div>
        <h1 id="titulo404">Pagina nao encontrada</h1>
        <p>
            O endereco que procuraste nao existe ou foi movido.
            Usa os atalhos abaixo para voltares ao fluxo normal.
        </p>

        <div class="actions">
            <a class="btn btn-primary" href="index.html">Voltar ao Login</a>
            <button class="btn btn-secondary" type="button" onclick="history.back()">Pagina Anterior</button>
        </div>

        <div class="logo">
            <img src="src/assets/images/jwayseamlessflow.png" alt="Jway">
        </div>
    </main>
</body>
</html>
